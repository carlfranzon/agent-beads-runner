name: Release

on:
  push:
    branches: [main]
    paths: [bin/abr]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Triggered by manual tag push
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Triggered by push to main — read version from script
            VERSION=$(grep -oP 'ABR_VERSION="\K[^"]+' bin/abr)
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Check if tag already exists
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag if needed
        if: steps.version.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/abr-${VERSION}.tar.gz" \
            --transform "s,^,abr-${VERSION}/," \
            bin/abr Makefile README.md LICENSE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/carlfranzon/agent-beads-runner/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/carlfranzon/homebrew-tap.git" tap-repo
          cd tap-repo

          cat > Formula/abr.rb <<EOF
          class Abr < Formula
            desc "Portable parallel AI agent launcher using git worktrees + beads"
            homepage "https://github.com/carlfranzon/agent-beads-runner"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "git"
            depends_on "python@3"

            def install
              bin.install "bin/abr"
            end

            test do
              assert_match "abr #{version}", shell_output("#{bin}/abr --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/abr.rb
          git commit -m "abr ${VERSION}"
          git push
